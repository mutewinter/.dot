# Jellybeans theme, matching ghostty/config and home/.alacritty.toml

theme = "custom"

[custom_theme]
base = "vitesse-black"
background = "#000000"
panel = "#0c0c0c"
panelAlt = "#151515"
border = "#3c3c3c"
accent = "#fad07a"
accentMuted = "#8f7c49"
text = "#dedede"
muted = "#686868"
addedBg = "#0e1f0e"
removedBg = "#260d10"
addedSignColor = "#94b979"
removedSignColor = "#e27373"

[custom_theme.syntax]
default = "#dedede"
keyword = "#8197bf"
string = "#99ad6a"
comment = "#888888"
number = "#cf6a4c"
function = "#fad07a"
property = "#97bedc"
type = "#ffb964"
variable = "#c6b6ee"
operator = "#dedede"
punctuation = "#888888"
