gui:
  expandFocusedSidePanel: true
  theme:
    selectedLineBgColor:
      - reverse
  nerdFontsVersion: "3"
git:
  pagers:
    - pager: delta --dark --paging=never
    - colorArg: always
      pager: hunk pager
    # - pager: delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
  skipHookPrefix: 'wip: '
  overrideGpg: true # prevents lazygit from spawning a separate process when using GPG
  parseEmoji: true # for use with https://gitmoji.dev
  autoForwardBranches: none
os:
  edit: code --reuse-window -- {{filename}}
  editAtLine: code --reuse-window --goto -- {{filename}}:{{line}}
  openDirInEditor: code -- {{dir}}
keybinding:
  universal:
    undo: '<c-u>'
    redo: '<c-z>'
